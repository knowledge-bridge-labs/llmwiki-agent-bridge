name: Usage question
description: Ask a setup, runtime profile, or Knowledge Source integration question.
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for non-sensitive usage questions. For suspected security vulnerabilities, follow SECURITY.md instead of opening a public issue.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Setup or installation
        - Runtime profile
        - Knowledge Source protocol
        - Source URL policy
        - Bridge authentication or CORS
        - Message contract or artifact shape
        - Not sure
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe what you are trying to do and where you got stuck.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include OS, Node/npm version, bridge commit or version, runtime profile, sanitized source descriptors, and sanitized responses when relevant.
  - type: checkboxes
    id: data_safety
    attributes:
      label: Data safety
      options:
        - label: This question does not include credentials, tokens, private endpoint URLs, private runtime URLs, raw sensitive source content, or unredacted logs.
          required: true
