name: Runtime or protocol compatibility
description: Report a runtime profile, Knowledge Source protocol, MCP-style, or A2A-style issue.
title: "[Compatibility]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for bridge contract, runtime profile, Knowledge Source protocol, trace, citation, graph, or compatibility problems. The MCP and A2A surfaces are MCP-style and A2A-style compatibility surfaces unless certified conformance is separately documented.
  - type: dropdown
    id: compatibility_area
    attributes:
      label: Compatibility area
      options:
        - Runtime profile metadata
        - OpenAI-compatible chat completions request
        - llmwiki-http source query
        - MCP JSON-RPC source query
        - A2A agent card or message handling
        - Result artifact shape
        - Citations, graph, or trace data
        - Multiple areas
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: runtime_profile
    attributes:
      label: Runtime profile
      options:
        - Hermes
        - DeepAgents
        - Generic OpenAI-compatible
        - Multiple profiles
        - Not applicable
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: source_protocol
    attributes:
      label: Knowledge Source protocol
      options:
        - llmwiki-http
        - MCP JSON-RPC
        - A2A
        - Multiple
        - Not applicable
        - Not sure
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Contract or compatibility issue
      description: Describe the runtime request, endpoint response, artifact, citation, graph data, trace step, or error handling that does not match the documented contract.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: validation
    attributes:
      label: Validation already tried
      options:
        - label: "`npm run lint`"
        - label: "`npm test`"
        - label: "`npm run pack:dry-run`"
        - label: Local bridge smoke test
        - label: Local llmwiki-serve smoke test
        - label: Runtime endpoint smoke test
  - type: textarea
    id: logs
    attributes:
      label: Logs or response samples
      description: Redact credentials, bearer tokens, private endpoint URLs, private paths, raw sensitive wiki content, runtime logs, and infrastructure details.
      render: text
  - type: checkboxes
    id: data_safety
    attributes:
      label: Data safety
      options:
        - label: This report does not include real credentials, tokens, private endpoint URLs, private exports, raw sensitive wiki content, or unredacted runtime logs.
          required: true
