name: Documentation issue
description: Report missing, confusing, or outdated project documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or file
      description: Point to the README, CONTRIBUTING, SECURITY, CODE_OF_CONDUCT, CHANGELOG, docs file, integration file, or GitHub template.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is confusing, missing, or outdated?
    validations:
      required: true
  - type: checkboxes
    id: affected_area
    attributes:
      label: Affected area
      options:
        - label: README
        - label: Quickstart
        - label: Runtime profiles
        - label: Direct client versus bridge path
        - label: Knowledge Source protocols
        - label: Source policy, CORS, or bearer auth
        - label: Programmatic API
        - label: Community or release docs
  - type: textarea
    id: suggested
    attributes:
      label: Suggested improvement
  - type: checkboxes
    id: data_safety
    attributes:
      label: Data safety
      options:
        - label: This issue does not include credentials, tokens, private endpoint URLs, request logs with secrets, raw sensitive data, or screenshots exposing private infrastructure.
          required: true
