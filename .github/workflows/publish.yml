name: publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify publish toolchain
        run: |
          node --version
          npm --version
          node -e "const v = require('child_process').execFileSync('npm', ['--version'], {encoding: 'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && (v[1] < 5 || (v[1] === 5 && v[2] < 1)))) throw new Error('npm 11.5.1+ is required for trusted publishing')"

      - run: npm ci
      - run: npm run check
      - run: npm run audit
      - run: npm run pack:dry-run
      - run: npm publish
